upstream backend {
    # Define backend servers with round-robin load balancing
    server localhost:3001;
    server localhost:3002;
}

server {
    listen 80;
    server_name localhost;

    client_max_body_size 2M;

    # Log format to show which server handled the request
    access_log /var/log/nginx/scalable-upload-access.log;
    error_log /var/log/nginx/scalable-upload-error.log;

    # Health check endpoint
    location /health {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Upload endpoint
    location /upload {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Required for file uploads
        proxy_request_buffering off;
        proxy_buffering off;
    }

    # Default location
    location / {
        return 404;
    }
}
