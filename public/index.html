<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scalable Image Upload Server</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
            padding: 40px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .upload-section {
            margin-bottom: 30px;
        }

        .upload-area {
            border: 2px dashed #667eea;
            border-radius: 8px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background-color: #f8f9ff;
        }

        .upload-area:hover {
            border-color: #764ba2;
            background-color: #f0f1ff;
        }

        .upload-area.dragover {
            border-color: #764ba2;
            background-color: #e8e9ff;
        }

        .upload-area i {
            font-size: 48px;
            color: #667eea;
            margin-bottom: 15px;
            display: block;
        }

        .upload-area p {
            color: #666;
            font-size: 14px;
            margin: 10px 0;
        }

        .upload-area .highlight {
            color: #667eea;
            font-weight: 600;
        }

        input[type="file"] {
            display: none;
        }

        .file-input-hidden {
            position: absolute;
            left: -9999px;
        }

        .button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 15px;
        }

        .button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .selected-file {
            background-color: #f0f1ff;
            border: 1px solid #e0e2ff;
            border-radius: 8px;
            padding: 15px;
            margin-top: 15px;
            display: none;
        }

        .selected-file.show {
            display: block;
        }

        .selected-file p {
            color: #666;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .selected-file .filename {
            color: #333;
            font-weight: 600;
            word-break: break-all;
        }

        .status {
            margin-top: 25px;
            padding: 20px;
            border-radius: 8px;
            display: none;
            font-size: 14px;
        }

        .status.show {
            display: block;
        }

        .status.loading {
            background-color: #e8eaf6;
            color: #667eea;
            border-left: 4px solid #667eea;
        }

        .status.success {
            background-color: #e8f5e9;
            color: #2e7d32;
            border-left: 4px solid #4caf50;
        }

        .status.error {
            background-color: #ffebee;
            color: #c62828;
            border-left: 4px solid #f44336;
        }

        .status-icon {
            display: inline-block;
            margin-right: 10px;
        }

        .result-container {
            display: none;
        }

        .result-container.show {
            display: block;
        }

        .result-item {
            background-color: #f5f5f5;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            word-break: break-all;
        }

        .result-label {
            color: #666;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 5px;
        }

        .result-value {
            color: #333;
            font-size: 13px;
            font-family: 'Courier New', monospace;
            word-break: break-all;
        }

        .result-value a {
            color: #667eea;
            text-decoration: none;
        }

        .result-value a:hover {
            text-decoration: underline;
        }

        .server-info {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .server-badge {
            background-color: #e3f2fd;
            color: #1976d2;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .reset-button {
            background: #f5f5f5;
            color: #666;
            margin-top: 15px;
            border: 1px solid #ddd;
        }

        .reset-button:hover {
            background: #eeeeee;
        }

        .health-check {
            text-align: center;
            margin-bottom: 20px;
            font-size: 12px;
        }

        .health-badge {
            display: inline-block;
            background-color: #e8f5e9;
            color: #2e7d32;
            padding: 6px 12px;
            border-radius: 20px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📸 Image Upload</h1>
            <p>Scalable Image Upload Server with Load Balancing</p>
        </div>

        <div class="health-check" id="healthCheck">
            <span class="health-badge">✓ Server Online</span>
        </div>

        <form id="uploadForm">
            <div class="upload-section">
                <div class="upload-area" id="uploadArea">
                    <p>📁</p>
                    <p>Drag and drop your image here</p>
                    <p>or <span class="highlight">click to browse</span></p>
                    <p style="margin-top: 15px; color: #999; font-size: 12px;">JPG, PNG • Max 2MB</p>
                </div>

                <div class="selected-file" id="selectedFile">
                    <p>Selected file:</p>
                    <p class="filename" id="selectedFileName"></p>
                </div>

                <button type="submit" class="button" id="uploadButton" disabled>
                    Upload Image
                </button>
            </div>
        </form>

        <div class="status" id="status"></div>

        <div class="result-container" id="resultContainer">
            <div class="result-item">
                <div class="result-label">Image URL</div>
                <div class="result-value">
                    <a id="imageUrl" href="#" target="_blank">View in S3</a>
                </div>
            </div>

            <div class="result-item">
                <div class="result-label">S3 Details</div>
                <div class="result-value">
                    <div><strong>Bucket:</strong> <span id="bucketName"></span></div>
                    <div style="margin-top: 8px;"><strong>Key:</strong> <span id="keyName"></span></div>
                </div>
            </div>

            <div class="result-item">
                <div class="result-label">Server Information</div>
                <div class="server-info" id="serverInfo"></div>
            </div>

            <button type="button" class="button reset-button" id="resetButton">
                Upload Another Image
            </button>
        </div>
    </div>

    <input type="file" id="fileInput" accept="image/jpeg,image/png" />

    <script>
        const uploadForm = document.getElementById('uploadForm');
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const selectedFile = document.getElementById('selectedFile');
        const selectedFileName = document.getElementById('selectedFileName');
        const uploadButton = document.getElementById('uploadButton');
        const status = document.getElementById('status');
        const resultContainer = document.getElementById('resultContainer');
        const resetButton = document.getElementById('resetButton');
        const healthCheck = document.getElementById('healthCheck');
        let selectedFileObj = null;

        // Check health on page load
        checkHealth();

        function checkHealth() {
            fetch('/health')
                .then(res => res.json())
                .then(data => {
                    healthCheck.innerHTML = `<span class="health-badge">✓ ${data.server}</span>`;
                })
                .catch(() => {
                    healthCheck.innerHTML = `<span class="health-badge" style="background-color: #ffebee; color: #c62828;">✗ Server Offline</span>`;
                });
        }

        // Upload area click
        uploadArea.addEventListener('click', () => fileInput.click());

        // File input change
        fileInput.addEventListener('change', (e) => {
            handleFileSelect(e.target.files[0]);
        });

        // Drag and drop
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            handleFileSelect(e.dataTransfer.files[0]);
        });

        function handleFileSelect(file) {
            if (!file) return;

            // Validate file type
            if (!['image/jpeg', 'image/png'].includes(file.type)) {
                showStatus('error', 'Only JPG and PNG images are allowed');
                return;
            }

            // Validate file size (2MB)
            if (file.size > 2 * 1024 * 1024) {
                showStatus('error', 'File size exceeds 2MB limit');
                return;
            }

            selectedFileObj = file;
            selectedFileName.textContent = file.name;
            selectedFile.classList.add('show');
            uploadButton.disabled = false;
            hideStatus();
        }

        uploadForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            if (!selectedFileObj) {
                showStatus('error', 'Please select an image first');
                return;
            }

            uploadButton.disabled = true;
            showStatus('loading', 'Uploading image...');

            const formData = new FormData();
            formData.append('image', selectedFileObj);

            try {
                const response = await fetch('/upload', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (response.ok) {
                    showStatus('success', 'Image uploaded successfully!');
                    displayResult(data);
                } else {
                    showStatus('error', data.error || 'Upload failed');
                }
            } catch (error) {
                showStatus('error', 'Network error: ' + error.message);
            } finally {
                uploadButton.disabled = false;
            }
        });

        function displayResult(data) {
            document.getElementById('imageUrl').href = data.url;
            document.getElementById('imageUrl').textContent = data.url;
            document.getElementById('bucketName').textContent = data.bucket;
            document.getElementById('keyName').textContent = data.key;

            const serverInfo = document.getElementById('serverInfo');
            serverInfo.innerHTML = `<span class="server-badge">${data.server}</span>`;

            resultContainer.classList.add('show');
        }

        function showStatus(type, message) {
            status.textContent = '';
            status.className = `status show ${type}`;

            const icons = {
                'loading': '⏳',
                'success': '✓',
                'error': '✗'
            };

            status.innerHTML = `<span class="status-icon">${icons[type]}</span>${message}`;
        }

        function hideStatus() {
            status.classList.remove('show');
        }

        resetButton.addEventListener('click', () => {
            fileInput.value = '';
            selectedFileObj = null;
            selectedFile.classList.remove('show');
            uploadButton.disabled = true;
            resultContainer.classList.remove('show');
            hideStatus();
        });
    </script>
</body>
</html>
